# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs # ignore Minimal Mistakes /docs
  - /test # ignore Minimal Mistakes /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: true
excerpt_separator: "<!--more-->" #"\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..10
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: true


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # https://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# 폰트 수정 : 구글 폰트를 사용해서 @import 소스코드를 복사
# sass-> mistake.~~ .scss에서 하단에 붙혀넣기하면됨
# valiables.scss 설정
# global-font-family $Sans-serif 변수에 css rules에 있는 코드를 붙혀넣기만 하면된다.
# 깃블로그를 작성했는데 커밋이력이 남지않는 경우
# pull request를하여 병합해주면 된다.

# Outputting
permalink: /:categories/:title/
paginate: 10 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones


# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache


# Archives
#  Type
#  - GitHub Pages compatible archive pages built with Liquid ~> type: liquid (default)
#  - Jekyll Archives plugin archive pages ~> type: jekyll-archives
#  Path (examples)
#  - Archive page should exist at path when using Liquid method or you can
#    expect broken links (especially with breadcrumbs enabled)
#  - <base_path>/tags/my-awesome-tag/index.html ~> path: /tags/
#  - <base_path>/categories/my-awesome-category/index.html ~> path: /categories/
#  - <base_path>/my-awesome-category/index.html ~> path: /

# 여기에 추가하고 싶은 카테고리나 태그를 지정하여 만들 수 있다.
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# 밑에 예시를 작성함
# ---
# title : "Category"
# layout : categories
# permalink : /categories/
# author_profile:true
# sidebar_main:true
# ---

# data디렉토리에 navigation.yml에 추가해야 될 내용
# -title : "Category"
#  url : /categories/

# posts에서 추가할 내용
# ---
# layout:single
# title:"..."
# categoies : coding
# ---

# 태그 추가 => 카테고리 설정한 방법을 동일하게 진행하면 됩니다.
# 복수 태그 => posts에 tags:[]안에 쉼표를 달면서 여러개를 설정할 수 있습니다.

# https://github.com/jekyll/jekyll-archives
# jekyll-archives:
#   enabled:
#     - categories
#     - tags
#   layouts:
#     category: archive-taxonomy
#     tag: archive-taxonomy
#   permalinks:
#     category: /categories/:name/
#     tag: /tags/:name/


# HTML Compression
# - https://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development


# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      show_date: true
      date_format : "%Y-%m-%d"
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
