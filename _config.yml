# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Theme Settings
#
# Review documentation to determine if you should use `theme` or `remote_theme`
# https://mmistakes.github.io/minimal-mistakes/docs/quick-start-guide/#installing-the-theme

# theme                  : "minimal-mistakes-jekyll"
# remote_theme           : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "dark" #"default", "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Site Settings
locale                   : "ko-KR" #"ko-KR"한국 "en-GB"영국 "en-US"미국 "fr-FR"프랑스(불어) "fr-CA"캐나다(불어)
title                    : "IT_AcornBlog"
title_separator          : "|"
subtitle                 : "a scribble book"
name                     : "Acorn"
description              : "The pain that can't kill me makes me stronger"
url                      : "https://kdh6194.github.io/" # the base hostname & protocol for your site e.g. "https://mmistakes.github.io"
baseurl                  : "https://kdh6194.github.io/" # the subpath of your site, e.g. "/blog"
repository               : "kdh6194/" # GitHub username/repo-name e.g. "mmistakes/minimal-mistakes"
teaser                   : "/assets/images/unsplash-image-1.png" # path of fallback teaser image, e.g. "/assets/images/500x300.png"
logo                     : "/assets/images/apple-touch-icon-76x76.png" # path of logo image to display in the masthead, e.g. "/assets/images/88x88.png"
masthead_title           : "Acorn" # overrides the website title displayed in the masthead, use " " for no title
breadcrumbs              : true # true, false (default)
words_per_minute         : 200
comments:
